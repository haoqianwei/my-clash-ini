; 1. 核心手动切换组
; 包含所有节点，同时也包含下面定义的基础自动选择分组
custom_proxy_group=🚀 国外流量`select`[]🇭🇰 香港节点`[]🇸🇬 新加坡节点`[]🇹🇼 台湾节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点`select`.*

; 2. 基础自动选择分组（按国家/地区）
; 这里会自动筛选包含对应关键字的节点，并选择延迟最低的
custom_proxy_group=🇭🇰 香港节点`url-test`(香港|HK|Hong Kong|HKT|HKBN|HGC)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美国节点`url-test`(美国|US|United States|America)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇹🇼 台湾节点`url-test`(台湾|TW|Taiwan|CHT|Hinet)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本节点`url-test`(日本|JP|Japan|Tokyo|Osaka)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 新加坡节点`url-test`(新加坡|坡|狮城|SG|Singapore)`http://www.gstatic.com/generate_204`300,,50

